<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1b4b"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="1198" height="398" rx="20" fill="url(#bg)"/>

  <!-- ECG heartbeat, confined to the far-right zone so it never crosses the text -->
  <path d="M792 210 H845 l10 -9 l10 9 h16 l9 8 l11 -92 l11 104 l9 -20 h16 l12 -14 l12 14 H1000 l10 -9 l10 9 h16 l9 8 l11 -92 l11 104 l9 -20 h16 l12 -14 l12 14 H1160"
        fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1056" cy="118" r="11" fill="#f43f5e" fill-opacity="0.25"/>
  <circle cx="1056" cy="118" r="5" fill="#f43f5e"/>

  <!-- title + tagline (left zone) -->
  <text x="60" y="150" fill="#f8fafc" font-size="60" font-weight="800" letter-spacing="-1">who-stresses-me-out</text>
  <text x="62" y="196" fill="#cbd5e1" font-size="23" font-weight="500">Which people and moments spike your stress?</text>
  <text x="62" y="228" fill="#94a3b8" font-size="17" font-weight="400">Correlate WHOOP heart-rate &amp; recovery with a one-tap meeting log.</text>

  <!-- chips -->
  <g font-size="15" font-weight="600">
    <rect x="62" y="292" width="150" height="34" rx="17" fill="#0b1220" stroke="#334155"/>
    <text x="137" y="314" fill="#e2e8f0" text-anchor="middle">WHOOP API</text>
    <rect x="224" y="292" width="150" height="34" rx="17" fill="#0b1220" stroke="#334155"/>
    <text x="299" y="314" fill="#e2e8f0" text-anchor="middle">Telegram bot</text>
    <rect x="386" y="292" width="234" height="34" rx="17" fill="#0b1220" stroke="#334155"/>
    <text x="503" y="314" fill="#e2e8f0" text-anchor="middle">stress ≈ HR over baseline</text>
    <rect x="632" y="292" width="128" height="34" rx="17" fill="#0b1220" stroke="#334155"/>
    <text x="696" y="314" fill="#e2e8f0" text-anchor="middle">Python 3.12</text>
  </g>
</svg>
