[tool.ruff]
line-length = 110
target-version = "py312"
extend-exclude = ["build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]  # long strings/URLs are fine

[tool.ruff.lint.per-file-ignores]
"_smoketest.py" = ["E402"]  # intentional mid-file re-import after switching DB_PATH

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = false
warn_unused_ignores = false
exclude = ["tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
